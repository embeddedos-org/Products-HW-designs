<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULP-SSN — PCB Schematic & EE Wiring</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0c10;
  --bg2: #0f1219;
  --bg3: #151a24;
  --border: #1e2535;
  --border2: #2a3347;
  --text: #c8d4e8;
  --text2: #6b7a99;
  --text3: #3d4d6b;
  --accent: #00d4ff;
  --accent2: #0099cc;
  --green: #00ff88;
  --green2: #00cc66;
  --amber: #ffaa00;
  --amber2: #cc7700;
  --red: #ff4466;
  --purple: #aa66ff;
  --teal: #00ffcc;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

/* ─── LAYOUT ─────────────────────────────── */
.shell { display: grid; grid-template-rows: 52px 1fr; grid-template-columns: 260px 1fr 320px; height: 100vh; overflow: hidden; }

/* ─── TOPBAR ─────────────────────────────── */
.topbar {
  grid-column: 1 / -1;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
}
.topbar .logo { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .08em; }
.topbar .logo span { color: var(--text2); font-weight: 400; }
.topbar .nav { display: flex; gap: 2px; margin-left: 24px; }
.nav-btn { font-family: var(--mono); font-size: 11px; padding: 5px 12px; border-radius: 5px; border: 1px solid transparent; cursor: pointer; color: var(--text2); background: transparent; transition: all .15s; }
.nav-btn:hover { color: var(--text); background: var(--bg3); }
.nav-btn.active { color: var(--accent); border-color: var(--border2); background: var(--bg3); }
.topbar .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; }
.badge.ok { background: rgba(0,255,136,.12); color: var(--green); border: 1px solid rgba(0,255,136,.25); }
.badge.warn { background: rgba(255,170,0,.1); color: var(--amber); border: 1px solid rgba(255,170,0,.2); }
.drc-btn { font-family: var(--mono); font-size: 11px; padding: 5px 14px; border-radius: 5px; border: 1px solid var(--border2); cursor: pointer; color: var(--text); background: var(--bg3); transition: all .15s; }
.drc-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ─── SIDEBAR LEFT ───────────────────────── */
.sidebar-l {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.sec-head { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: .12em; padding: 14px 16px 6px; text-transform: uppercase; }
.comp-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 16px; cursor: pointer; transition: background .12s;
  border-left: 2px solid transparent;
}
.comp-item:hover { background: var(--bg3); }
.comp-item.sel { background: rgba(0,212,255,.07); border-left-color: var(--accent); }
.comp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.comp-name { font-family: var(--mono); font-size: 11px; color: var(--text); }
.comp-ref { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-left: auto; }
.divider { height: 1px; background: var(--border); margin: 6px 0; }

/* bus legend */
.bus-legend { padding: 10px 16px; display: flex; flex-direction: column; gap: 5px; }
.bus-row { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; }
.bus-swatch { width: 28px; height: 3px; border-radius: 2px; }
.bus-label-l { color: var(--text2); }

/* ─── CANVAS ─────────────────────────────── */
.canvas-wrap { position: relative; overflow: hidden; background: var(--bg); cursor: grab; }
.canvas-wrap:active { cursor: grabbing; }
canvas { display: block; }
.zoom-ctrl { position: absolute; bottom: 16px; left: 16px; display: flex; gap: 4px; }
.zb { font-family: var(--mono); font-size: 14px; width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.zb:hover { border-color: var(--accent); color: var(--accent); }
.coord { position: absolute; bottom: 16px; right: 16px; font-family: var(--mono); font-size: 10px; color: var(--text3); }
.layer-ctrl { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 4px; }
.layer-btn { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.layer-btn .ls { width: 10px; height: 3px; border-radius: 1px; }
.layer-btn.on { color: var(--text); background: var(--bg3); }

/* ─── SIDEBAR RIGHT ──────────────────────── */
.sidebar-r {
  background: var(--bg2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.detail-head { padding: 16px; border-bottom: 1px solid var(--border); }
.detail-head .ref { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--accent); }
.detail-head .full { font-family: var(--mono); font-size: 11px; color: var(--text2); margin-top: 2px; }
.detail-head .pkg { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 4px; }
.pin-table { width: 100%; border-collapse: collapse; }
.pin-table th { font-family: var(--mono); font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; padding: 8px 16px 4px; text-align: left; }
.pin-table td { font-family: var(--mono); font-size: 10px; padding: 5px 16px; border-bottom: 1px solid var(--border); color: var(--text2); }
.pin-table td:first-child { color: var(--text3); width: 36px; }
.pin-table td:nth-child(2) { color: var(--text); font-weight: 500; }
.pin-table tr:hover td { background: var(--bg3); }
.bus-tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.bt-spi  { background: rgba(0,212,255,.15); color: var(--accent); }
.bt-i2c  { background: rgba(0,255,136,.15); color: var(--green); }
.bt-uart { background: rgba(255,170,0,.15); color: var(--amber); }
.bt-gpio { background: rgba(170,102,255,.15); color: var(--purple); }
.bt-pwr  { background: rgba(255,68,102,.15); color: var(--red); }
.bt-gnd  { background: rgba(107,122,153,.15); color: var(--text2); }
.bt-mem  { background: rgba(0,255,204,.15); color: var(--teal); }
.net-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.net-section h4 { font-family: var(--mono); font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
.net-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.net-name { font-family: var(--mono); font-size: 10px; color: var(--text); }
.net-val { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.note-box { margin: 12px 16px; padding: 10px 12px; border-radius: 6px; border: 1px solid rgba(255,170,0,.2); background: rgba(255,170,0,.05); font-family: var(--mono); font-size: 10px; color: var(--amber); line-height: 1.6; }
.rule-list { padding: 8px 16px; display: flex; flex-direction: column; gap: 4px; }
.rule { font-family: var(--mono); font-size: 10px; color: var(--text2); display: flex; gap: 6px; align-items: flex-start; line-height: 1.5; }
.rule::before { content: '→'; color: var(--text3); flex-shrink: 0; }
.placeholder { padding: 40px 20px; text-align: center; }
.placeholder p { font-family: var(--mono); font-size: 11px; color: var(--text3); line-height: 1.8; }
</style>
</head>
<body>
<div class="shell">

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">ULP-SSN <span>/ PCB Schematic v0.1</span></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="setView('schematic',this)">Schematic</button>
    <button class="nav-btn" onclick="setView('layout',this)">Board layout</button>
    <button class="nav-btn" onclick="setView('netlist',this)">Net list</button>
    <button class="nav-btn" onclick="setView('bom',this)">BOM</button>
  </nav>
  <div class="right">
    <span class="badge ok">DRC: 0 errors</span>
    <span class="badge warn">3 warnings</span>
    <button class="drc-btn">Run DRC</button>
  </div>
</header>

<!-- SIDEBAR LEFT -->
<aside class="sidebar-l">
  <div class="sec-head">Components</div>
  <div id="comp-list"></div>
  <div class="divider"></div>
  <div class="sec-head">Bus legend</div>
  <div class="bus-legend" id="bus-legend"></div>
  <div class="divider"></div>
  <div class="sec-head">Layers</div>
  <div style="padding:8px 16px;display:flex;flex-direction:column;gap:4px" id="layer-list"></div>
</aside>

<!-- CANVAS -->
<main class="canvas-wrap" id="canvas-wrap">
  <canvas id="sch"></canvas>
  <div class="layer-ctrl" id="layer-ctrl"></div>
  <div class="zoom-ctrl">
    <button class="zb" onclick="zoom(1.2)">+</button>
    <button class="zb" onclick="zoom(0.8)">−</button>
    <button class="zb" onclick="resetView()" title="Reset">⌂</button>
  </div>
  <div class="coord" id="coord">x: 0  y: 0</div>
</main>

<!-- SIDEBAR RIGHT -->
<aside class="sidebar-r" id="detail-panel">
  <div class="placeholder">
    <p>Click a component<br>to view pin details,<br>net connections,<br>and design rules.</p>
  </div>
</aside>

</div>

const NETS = {
  'SPI0': { nodes:['U1 PA0-3','U3 CCLK/DIN/DOUT/CS_B'], freq:'up to 50MHz', imp:'50Ω', len:'match ±0.5mm' },
  'I2C0': { nodes:['U1 PB0-1','U2 SDA/SCL','U4 IOM0'], freq:'400kHz', imp:'—', len:'< 100mm total' },
  'UART0':{ nodes:['U1 PC0-1','J3 TX/RX'], freq:'115200–1Mbaud', imp:'—', len:'< 50mm' },
  'MEM0': { nodes:['U1 PD0-31','U3 DQ0-31','U5 DQ0-31'], freq:'133MHz', imp:'50Ω', len:'match ±0.1mm' },
  'VCC_MCU': { nodes:['PMIC OUT1','U1 VDD','U2 VCC','U3 VCCO'], volt:'3.3V', curr:'500mA max', cap:'100µF bulk' },
  'VCC_AON': { nodes:['PMIC OUT_AON','U4 VDD'], volt:'1.8V/3.3V', curr:'50mA max', cap:'10µF bulk' },
  'VCCINT': { nodes:['PMIC OUT2','U3 VCCINT'], volt:'0.9V', curr:'2A max', cap:'47µF bulk + 100nF×16' },
};

const LAYERS = [
  { id:'F.Cu',   label:'Top copper',     color:'#ff4466', on:true },
  { id:'In1.Cu', label:'GND plane',      color:'#6b7a99', on:true },
  { id:'In2.Cu', label:'Power plane',    color:'#ff6600', on:true },
  { id:'In3.Cu', label:'Signal 1',       color:'#00d4ff', on:true },
  { id:'In4.Cu', label:'Signal 2',       color:'#00ffcc', on:false },
  { id:'B.Cu',   label:'Bottom copper',  color:'#00ff88', on:true },
  { id:'F.SilkS',label:'Silkscreen',     color:'#ffffff', on:true },
  { id:'Edge',   label:'Board outline',  color:'#ffaa00', on:true },
];

// ═══════════════════════════════════════════════════
//  RENDER SIDEBAR
// ═══════════════════════════════════════════════════
let selectedComp = null;

function renderSidebar() {
  const list = document.getElementById('comp-list');
  list.innerHTML = COMPS.map(c => `
    <div class="comp-item${selectedComp===c.id?' sel':''}" onclick="selectComp('${c.id}')">
      <div class="comp-dot" style="background:${c.color}"></div>
      <span class="comp-name">${c.name}</span>
      <span class="comp-ref">${c.ref}</span>
    </div>`).join('');

  const leg = document.getElementById('bus-legend');
  leg.innerHTML = BUSES.map(b => `
    <div class="bus-row">
      <div class="bus-swatch" style="background:${b.color}"></div>
      <span class="bus-label-l">${b.label}</span>
    </div>`).join('');

  const ll = document.getElementById('layer-list');
  ll.innerHTML = LAYERS.map(l => `
    <div class="layer-btn${l.on?' on':''}" onclick="toggleLayer('${l.id}',this)" id="lb_${l.id}">
      <div class="ls" style="background:${l.color};opacity:${l.on?1:.3}"></div>
      <span style="font-family:var(--mono);font-size:10px">${l.label}</span>
    </div>`).join('');
}

function toggleLayer(id, el) {
  const l = LAYERS.find(x=>x.id===id);
  l.on = !l.on;
  el.classList.toggle('on', l.on);
  el.querySelector('.ls').style.opacity = l.on ? 1 : 0.3;
  drawSchematic();
}

// ═══════════════════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════════════════
function selectComp(id) {
  selectedComp = id;
  renderSidebar();
  drawSchematic();
  const c = COMPS.find(x=>x.id===id);
  const panel = document.getElementById('detail-panel');

  const busTag = (bus) => `<span class="bus-tag bt-${bus}">${bus.toUpperCase()}</span>`;

  const pinRows = c.pins.map(p => `
    <tr>
      <td>${p.n}</td>
      <td>${p.func}</td>
      <td>${busTag(p.bus)}</td>
      <td>${p.conn}</td>
    </tr>`).join('');

  const netRows = Object.entries(NETS)
    .filter(([k,v]) => v.nodes.some(n => n.startsWith(c.ref)))
    .map(([k,v]) => `
      <div class="net-row">
        <span class="net-name">${k}</span>
        <span class="net-val">${v.freq||v.volt||'—'}</span>
      </div>`).join('') || '<div class="net-row"><span class="net-name" style="color:var(--text3)">No nets indexed</span></div>';

  panel.innerHTML = `
    <div class="detail-head">
      <div class="ref">${c.ref}</div>
      <div class="full">${c.full}</div>
      <div class="pkg">${c.pkg}</div>
    </div>
    <table class="pin-table">
      <thead><tr><th>Pin</th><th>Function</th><th>Bus</th><th>Connected to</th></tr></thead>
      <tbody>${pinRows}</tbody>
    </table>
    <div class="net-section">
      <h4>Nets</h4>
      ${netRows}
    </div>
    <div class="note-box">${c.notes}</div>
    <div class="sec-head" style="padding:12px 16px 4px">Design rules</div>
    <div class="rule-list">
      ${c.rules.map(r=>`<div class="rule">${r}</div>`).join('')}
    </div>`;
}

// ═══════════════════════════════════════════════════
//  CANVAS / SCHEMATIC
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('sch');
const ctx = canvas.getContext('2d');
let scale = 1, panX = 0, panY = 0;
let dragging = false, lastMX = 0, lastMY = 0;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  drawSchematic();
}

function worldToScreen(x, y) {
  return [x * scale + panX, y * scale + panY];
}
function screenToWorld(sx, sy) {
  return [(sx - panX) / scale, (sy - panY) / scale];
}

const BUS_COLOR = {};
BUSES.forEach(b => BUS_COLOR[b.id] = b.color);
const BUS_WIDTH = {};
BUSES.forEach(b => BUS_WIDTH[b.id] = b.w);

// Wires defined as {from:[cx,cy], to:[cx,cy], bus:'spi', label:'SPI0'}
// Component center x = c.x + c.w/2, center y = c.y + c.h/2
function getCenter(id) {
  const c = COMPS.find(x=>x.id===id);
  return [c.x + c.w/2, c.y + c.h/2];
}

const WIRES = [
  // U1 ↔ U3  SPI0
  { pts:[[430,200+110],[490,200+110],[490,160+130],[580,160+130]], bus:'spi', label:'SPI0' },
  // U1 ↔ U2  I2C
  { pts:[[340,200+60],[220,200+60]], bus:'i2c', label:'I²C' },
  // U1 ↔ U4  I2C (shared)
  { pts:[[220,200+60],[220,400+80],[80+75,400+80]], bus:'i2c', label:'' },
  // U1 ↔ J3  UART
  { pts:[[430+90,200+40],[520,200+40],[520,80+50],[580,80+50]], bus:'uart', label:'UART0' },
  // U1 ↔ U5  MEM
  { pts:[[340+80,200+220],[340+80,500+70]], bus:'mem', label:'EBI/MEM' },
  // U3 ↔ U5  MEM
  { pts:[[580+100,160+260],[500,160+260],[500,500+70],[340+160,500+70]], bus:'mem', label:'' },
  // U4 → U1  WAKE GPIO
  { pts:[[80+150,400+40],[280,400+40],[280,200+180],[340,200+180]], bus:'gpio', label:'WAKE' },
  // U4 → PMIC  EN rails (implied)
  { pts:[[80+75,400],[80+75,340],[40,340],[40,80+35],[80,80+35]], bus:'gpio', label:'EN_*' },
  // U2 ↔ I2C bus
  { pts:[[80+130,200+60],[220,200+60]], bus:'i2c', label:'' },
  // J1 power in
  { pts:[[80+60,80+70],[80+60,160],[160,160],[160,200+20],[200,200+20]], bus:'pwr', label:'V_SOLAR' },
  // FPGA ↔ Radio SPI2
  { pts:[[580+75,160],[580+75,80+100]], bus:'spi', label:'SPI2' },
  // J2 JTAG
  { pts:[[580+75,500],[520,500],[520,200+200],[430+50,200+200]], bus:'gpio', label:'JTAG' },
];

function drawSchematic() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.save();
  ctx.strokeStyle = '#1a2030';
  ctx.lineWidth = 0.5;
  const gs = 20 * scale;
  const ox = ((panX % gs) + gs) % gs;
  const oy = ((panY % gs) + gs) % gs;
  for(let x = ox; x < canvas.width; x += gs) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for(let y = oy; y < canvas.height; y += gs) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
  ctx.restore();

  // Wires
  for (const wire of WIRES) {
    const col = BUS_COLOR[wire.bus] || '#fff';
    const lw  = (BUS_WIDTH[wire.bus] || 1) * scale;
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    const [sx, sy] = worldToScreen(wire.pts[0][0], wire.pts[0][1]);
    ctx.moveTo(sx, sy);
    for (let i=1; i<wire.pts.length; i++) {
      const [wx, wy] = worldToScreen(wire.pts[i][0], wire.pts[i][1]);
      ctx.lineTo(wx, wy);
    }
    ctx.stroke();
    // junction dots
    for (let i=1; i<wire.pts.length-1; i++) {
      const [jx, jy] = worldToScreen(wire.pts[i][0], wire.pts[i][1]);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(jx, jy, 3*scale, 0, Math.PI*2);
      ctx.fill();
    }
    // label
    if (wire.label) {
      const mid = Math.floor(wire.pts.length/2);
      const [lx, ly] = worldToScreen(wire.pts[mid][0]-4, wire.pts[mid][1]-8);
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = col;
      ctx.font = `${Math.max(8, 9*scale)}px 'JetBrains Mono', monospace`;
      ctx.fillText(wire.label, lx, ly);
    }
    ctx.restore();
  }

  // Components
  for (const c of COMPS) {
    const [sx, sy] = worldToScreen(c.x, c.y);
    const sw = c.w * scale, sh = c.h * scale;
    const isSel = selectedComp === c.id;

    ctx.save();
    // Shadow / glow
    if (isSel) {
      ctx.shadowColor = c.color;
      ctx.shadowBlur = 18;
    }
    // Fill
    ctx.fillStyle = isSel ? c.color+'22' : '#0f1219cc';
    ctx.strokeStyle = isSel ? c.color : c.color+'66';
    ctx.lineWidth = isSel ? 2 : 1;
    roundRect(ctx, sx, sy, sw, sh, 6*scale);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Corner marks
    const cm = 8*scale;
    ctx.strokeStyle = c.color;
    ctx.lineWidth = isSel ? 2 : 1;
    ctx.globalAlpha = isSel ? 1 : 0.6;
    // TL
    ctx.beginPath(); ctx.moveTo(sx+cm,sy); ctx.lineTo(sx,sy); ctx.lineTo(sx,sy+cm); ctx.stroke();
    // TR
    ctx.beginPath(); ctx.moveTo(sx+sw-cm,sy); ctx.lineTo(sx+sw,sy); ctx.lineTo(sx+sw,sy+cm); ctx.stroke();
    // BL
    ctx.beginPath(); ctx.moveTo(sx+cm,sy+sh); ctx.lineTo(sx,sy+sh); ctx.lineTo(sx,sy+sh-cm); ctx.stroke();
    // BR
    ctx.beginPath(); ctx.moveTo(sx+sw-cm,sy+sh); ctx.lineTo(sx+sw,sy+sh); ctx.lineTo(sx+sw,sy+sh-cm); ctx.stroke();

    ctx.globalAlpha = 1;

    // Ref label
    ctx.font = `bold ${Math.max(9, 11*scale)}px 'JetBrains Mono',monospace`;
    ctx.fillStyle = isSel ? c.color : c.color+'cc';
    ctx.fillText(c.ref, sx+8*scale, sy+16*scale);

    // Name
    if (sw > 80) {
      ctx.font = `${Math.max(7, 9*scale)}px 'JetBrains Mono',monospace`;
      ctx.fillStyle = '#c8d4e8aa';
      const nameLines = c.name.split(' ');
      nameLines.forEach((ln,i) => ctx.fillText(ln, sx+8*scale, sy+28*scale+i*11*scale));
    }

    // Pin stubs along sides
    if (scale > 0.6) {
      const pinCount = Math.min(c.pins.length, 8);
      const pinSpacing = sh / (pinCount + 1);
      for (let i=0; i<pinCount; i++) {
        const pin = c.pins[i];
        const py = sy + pinSpacing*(i+1);
        const col = BUS_COLOR[pin.bus] || '#fff';
        const stubLen = 12 * scale;
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.7;
        // Left stubs
        ctx.beginPath(); ctx.moveTo(sx, py); ctx.lineTo(sx-stubLen, py); ctx.stroke();
        // Dot
        ctx.fillStyle = col;
        ctx.globalAlpha = 0.9;
        ctx.beginPath(); ctx.arc(sx-stubLen, py, 2.5*scale, 0, Math.PI*2); ctx.fill();
        // Pin label
        if (scale > 0.9) {
          ctx.globalAlpha = 0.6;
          ctx.font = `${7*scale}px 'JetBrains Mono',monospace`;
          ctx.fillStyle = col;
          ctx.fillText(pin.func || pin.n, sx-stubLen-2, py+2*scale);
          ctx.textAlign = 'right';
          ctx.fillText(pin.func || pin.n, sx-stubLen-2, py+2*scale);
          ctx.textAlign = 'left';
        }
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// Click to select
canvas.addEventListener('click', (e) => {
  if (Math.abs(e.clientX-lastMX)+Math.abs(e.clientY-lastMY) > 4) return;
  const rect = canvas.getBoundingClientRect();
  const [wx, wy] = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  for (const c of COMPS) {
    if (wx>=c.x && wx<=c.x+c.w && wy>=c.y && wy<=c.y+c.h) {
      selectComp(c.id); return;
    }
  }
  selectedComp = null;
  renderSidebar();
  drawSchematic();
  document.getElementById('detail-panel').innerHTML = '<div class="placeholder"><p>Click a component<br>to view pin details,<br>net connections,<br>and design rules.</p></div>';
});

// Pan
canvas.addEventListener('mousedown', e => { dragging=true; lastMX=e.clientX; lastMY=e.clientY; });
window.addEventListener('mouseup', () => dragging=false);
window.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const [wx, wy] = screenToWorld(e.clientX-rect.left, e.clientY-rect.top);
  document.getElementById('coord').textContent = `x: ${Math.round(wx)}  y: ${Math.round(wy)}`;
  if (!dragging) return;
  panX += e.clientX - lastMX;
  panY += e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  drawSchematic();
});

// Scroll to zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  panX = mx - (mx - panX)*factor;
  panY = my - (my - panY)*factor;
  scale *= factor;
  scale = Math.max(0.3, Math.min(4, scale));
  drawSchematic();
}, {passive:false});

function zoom(f) {
  const cx = canvas.width/2, cy = canvas.height/2;
  panX = cx - (cx-panX)*f;
  panY = cy - (cy-panY)*f;
  scale *= f;
  scale = Math.max(0.3, Math.min(4, scale));
  drawSchematic();
}

function resetView() {
  scale = 0.85;
  const wrap = document.getElementById('canvas-wrap');
  panX = wrap.clientWidth*0.05;
  panY = wrap.clientHeight*0.05;
  drawSchematic();
}

// ═══════════════════════════════════════════════════
//  VIEW TABS (Netlist / BOM stubs)
// ═══════════════════════════════════════════════════
function setView(v, btn) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const wrap = document.getElementById('canvas-wrap');
  if (v==='schematic') {
    wrap.style.display=''; drawSchematic();
  } else if (v==='netlist') {
    wrap.style.display='none';
    showNetlist();
  } else if (v==='bom') {
    wrap.style.display='none';
    showBOM();
  } else if (v==='layout') {
    wrap.style.display='none';
    showLayout();
  }
}

function showNetlist() {
  const panel = document.getElementById('detail-panel');
  let html = '<div style="padding:16px">';
  html += '<div class="sec-head" style="padding:0 0 8px">Net list</div>';
  for (const [net, d] of Object.entries(NETS)) {
    html += `<div class="net-section"><h4>${net}</h4>`;
    html += `<div class="net-row"><span class="net-name">Nodes</span><span class="net-val" style="font-size:10px;text-align:right">${d.nodes.join(', ')}</span></div>`;
    if(d.freq) html += `<div class="net-row"><span class="net-name">Frequency</span><span class="net-val">${d.freq}</span></div>`;
    if(d.volt) html += `<div class="net-row"><span class="net-name">Voltage</span><span class="net-val">${d.volt}</span></div>`;
    if(d.imp)  html += `<div class="net-row"><span class="net-name">Impedance</span><span class="net-val">${d.imp}</span></div>`;
    if(d.len)  html += `<div class="net-row"><span class="net-name">Trace match</span><span class="net-val">${d.len}</span></div>`;
    html += '</div>';
  }
  html += '</div>';
  // show in canvas area (repurpose)
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.display='block';
  wrap.innerHTML = `<div style="padding:20px;overflow:auto;height:100%;font-family:var(--mono);color:var(--text);background:var(--bg)">${html}</div>`;
}

function showBOM() {
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.display='block';
  const rows = COMPS.map(c=>`
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 12px;color:var(--accent);font-weight:700">${c.ref}</td>
      <td style="padding:8px 12px;color:var(--text)">${c.full}</td>
      <td style="padding:8px 12px;color:var(--text2)">${c.pkg}</td>
      <td style="padding:8px 12px;color:var(--text2)">${c.pins.length}</td>
    </tr>`).join('');
  wrap.innerHTML = `<div style="padding:20px;overflow:auto;height:100%">
    <div class="sec-head" style="padding:0 0 12px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.12em">Bill of Materials</div>
    <table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px">
      <thead><tr style="border-bottom:1px solid var(--border2)">
        <th style="padding:6px 12px;text-align:left;color:var(--text3);font-size:9px;text-transform:uppercase">Ref</th>
        <th style="padding:6px 12px;text-align:left;color:var(--text3);font-size:9px;text-transform:uppercase">Component</th>
        <th style="padding:6px 12px;text-align:left;color:var(--text3);font-size:9px;text-transform:uppercase">Package</th>
        <th style="padding:6px 12px;text-align:left;color:var(--text3);font-size:9px;text-transform:uppercase">Pins</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function showLayout() {
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.display='block';
  wrap.innerHTML = `<div style="padding:24px;font-family:var(--mono);color:var(--text3);text-align:center;margin-top:60px">
    <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Board layout view</div>
    <div style="font-size:11px;line-height:2">
      10–12 layer PCB · 150×100mm recommended<br>
      Layer 1: Top signal (SPI, UART, GPIO)<br>
      Layer 2: GND plane (uninterrupted)<br>
      Layer 3: Power planes (3.3V, 1.8V)<br>
      Layer 4–5: High-speed signal (MEM bus)<br>
      Layer 6: Inner signal 2<br>
      Layer 7–9: FPGA core routing<br>
      Layer 10: Bottom copper + GND fill<br><br>
      <span style="color:var(--amber)">Export to Altium / KiCad for full layout →</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
renderSidebar();
resize();
resetView();
window.addEventListener('resize', resize);
</script>
</body>
</html>
